<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bottomLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#2563EB" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Checklist icon decoration (light theme) -->
  <rect x="980" y="200" width="160" height="220" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1" opacity="0.4"/>
  <line x1="1010" y1="240" x2="1110" y2="240" stroke="#2563EB" stroke-width="2" opacity="0.3"/>
  <line x1="1010" y1="270" x2="1110" y2="270" stroke="#2563EB" stroke-width="2" opacity="0.25"/>
  <line x1="1010" y1="300" x2="1090" y2="300" stroke="#2563EB" stroke-width="2" opacity="0.2"/>
  <line x1="1010" y1="330" x2="1100" y2="330" stroke="#2563EB" stroke-width="2" opacity="0.15"/>
  <!-- Check marks -->
  <polyline points="1000,238 1006,244 1014,232" fill="none" stroke="#2563EB" stroke-width="2" opacity="0.6"/>
  <polyline points="1000,268 1006,274 1014,262" fill="none" stroke="#2563EB" stroke-width="2" opacity="0.5"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="150" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.1"/>
  <circle cx="100" cy="550" r="140" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.07"/>

  <!-- Left accent bar -->
  <rect x="60" y="160" width="4" height="310" rx="2" fill="#2563EB" opacity="0.8"/>

  <!-- Logo -->
  <text x="80" y="100" font-family="'Arial Black', Arial, sans-serif" font-size="32" font-weight="900" fill="#2563EB" letter-spacing="1">CryptoYieldGuide</text>
  <text x="80" y="122" font-family="Arial, sans-serif" font-size="13" fill="#64748B" letter-spacing="4">CRYPTO PASSIVE INCOME</text>
  <line x1="80" y1="135" x2="420" y2="135" stroke="#2563EB" stroke-width="1" opacity="0.3"/>

  <!-- Main title -->
  <text x="80" y="290" font-family="'Arial Black', Arial, sans-serif" font-size="72" font-weight="900" fill="#1E293B" letter-spacing="-1">Practical</text>
  <text x="80" y="378" font-family="'Arial Black', Arial, sans-serif" font-size="72" font-weight="900" fill="#1E293B" letter-spacing="-1">Crypto Guides</text>

  <!-- Subtitle -->
  <text x="80" y="435" font-family="Arial, sans-serif" font-size="24" fill="#64748B" letter-spacing="0.5">Step-by-step walkthroughs for every skill level</text>

  <!-- Category tag -->
  <rect x="80" y="463" width="120" height="36" rx="18" fill="#2563EB" opacity="0.1"/>
  <rect x="80" y="463" width="120" height="36" rx="18" fill="none" stroke="#2563EB" stroke-width="1.5" opacity="0.5"/>
  <text x="140" y="486" font-family="Arial, sans-serif" font-size="14" fill="#2563EB" text-anchor="middle" letter-spacing="2" font-weight="700">GUIDES</text>

  <!-- Domain -->
  <text x="1140" y="600" font-family="Arial, sans-serif" font-size="20" fill="#2563EB" text-anchor="end" opacity="0.8" letter-spacing="1">cryptoyieldguide.com</text>

  <!-- Bottom gradient line -->
  <rect x="0" y="618" width="1200" height="4" fill="url(#bottomLine)"/>
</svg>
