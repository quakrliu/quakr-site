<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1422;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bottomLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#22d3ee" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Calculator/Tool icon decoration -->
  <rect x="970" y="180" width="180" height="240" rx="12" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.25"/>
  <rect x="970" y="180" width="180" height="240" rx="12" fill="#22d3ee" opacity="0.04"/>
  <!-- Screen area -->
  <rect x="985" y="195" width="150" height="60" rx="4" fill="#22d3ee" opacity="0.08"/>
  <rect x="985" y="195" width="150" height="60" rx="4" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>
  <text x="1060" y="233" font-family="'Courier New', Courier, monospace" font-size="20" fill="#22d3ee" text-anchor="middle" opacity="0.6">8.74%</text>
  <!-- Buttons -->
  <rect x="990" y="268" width="38" height="28" rx="4" fill="#22d3ee" opacity="0.12" stroke="#22d3ee" stroke-width="1" opacity2="0.2"/>
  <rect x="990" y="268" width="38" height="28" rx="4" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>
  <rect x="1041" y="268" width="38" height="28" rx="4" fill="#22d3ee" opacity="0.12"/>
  <rect x="1041" y="268" width="38" height="28" rx="4" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>
  <rect x="1092" y="268" width="38" height="28" rx="4" fill="#22d3ee" opacity="0.12"/>
  <rect x="1092" y="268" width="38" height="28" rx="4" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>
  <rect x="990" y="308" width="38" height="28" rx="4" fill="#22d3ee" opacity="0.08"/>
  <rect x="990" y="308" width="38" height="28" rx="4" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.15"/>
  <rect x="1041" y="308" width="38" height="28" rx="4" fill="#22d3ee" opacity="0.08"/>
  <rect x="1041" y="308" width="38" height="28" rx="4" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.15"/>
  <rect x="1092" y="308" width="38" height="28" rx="4" fill="#22d3ee" opacity="0.2"/>
  <rect x="1092" y="308" width="38" height="28" rx="4" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
  <text x="1111" y="327" font-family="Arial, sans-serif" font-size="16" fill="#22d3ee" text-anchor="middle" opacity="0.8">=</text>
  <rect x="990" y="348" width="140" height="28" rx="4" fill="#22d3ee" opacity="0.08"/>
  <rect x="990" y="348" width="140" height="28" rx="4" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.15"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80" r="150" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.06"/>
  <circle cx="100" cy="550" r="140" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.05"/>

  <!-- Left accent bar -->
  <rect x="60" y="160" width="4" height="310" rx="2" fill="#22d3ee" opacity="0.6"/>

  <!-- Logo -->
  <text x="80" y="100" font-family="'Courier New', Courier, monospace" font-size="36" font-weight="700" fill="#22d3ee" filter="url(#glow)" letter-spacing="2">QUAKR</text>
  <text x="80" y="122" font-family="'Courier New', Courier, monospace" font-size="13" fill="#22d3ee" opacity="0.6" letter-spacing="4">CRYPTO INTELLIGENCE</text>
  <line x1="80" y1="135" x2="340" y2="135" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>

  <!-- Main title -->
  <text x="80" y="290" font-family="'Arial Black', Arial, sans-serif" font-size="78" font-weight="900" fill="#ffffff" letter-spacing="-1">Free Crypto</text>
  <text x="80" y="378" font-family="'Arial Black', Arial, sans-serif" font-size="78" font-weight="900" fill="#ffffff" letter-spacing="-1">Tools</text>

  <!-- Subtitle -->
  <text x="80" y="435" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" letter-spacing="1">Staking calculators, yield comparators &amp; more</text>

  <!-- Category tag -->
  <rect x="80" y="463" width="110" height="36" rx="18" fill="#22d3ee" opacity="0.15"/>
  <rect x="80" y="463" width="110" height="36" rx="18" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
  <text x="135" y="486" font-family="Arial, sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle" letter-spacing="2">TOOLS</text>

  <!-- Domain -->
  <text x="1140" y="600" font-family="'Courier New', Courier, monospace" font-size="20" fill="#22d3ee" text-anchor="end" opacity="0.8" letter-spacing="1">quakr.dev</text>

  <!-- Bottom gradient line -->
  <rect x="0" y="618" width="1200" height="3" fill="url(#bottomLine)"/>
  <rect x="0" y="621" width="1200" height="1" fill="url(#bottomLine)" opacity="0.3"/>
</svg>
