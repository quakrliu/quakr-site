<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1422"/>
      <stop offset="100%" style="stop-color:#0a0e17"/>
    </linearGradient>
    <linearGradient id="borderG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="url(#bgG)"/>

  <!-- Subtle border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.5" fill="none" stroke="url(#borderG)" stroke-width="1"/>

  <!-- Q letter - bold, centered, glowing -->
  <text
    x="16"
    y="22.5"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-weight="900"
    font-size="21"
    fill="#22d3ee"
    filter="url(#glow)"
    letter-spacing="-1"
  >Q</text>

  <!-- Bottom accent line -->
  <rect x="6" y="29" width="20" height="1.5" rx="0.75" fill="#22d3ee" opacity="0.5"/>
</svg>
