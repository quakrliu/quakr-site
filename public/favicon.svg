<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="url(#bgG)"/>

  <!-- PYL letters - bold, centered, white -->
  <text
    x="16"
    y="21"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-weight="900"
    font-size="10"
    fill="#FFFFFF"
    letter-spacing="-0.5"
  >PYL</text>

  <!-- Bottom accent line -->
  <rect x="6" y="27" width="20" height="1.5" rx="0.75" fill="#FFFFFF" opacity="0.4"/>
</svg>
