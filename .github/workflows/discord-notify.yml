name: Discord Notify

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new articles
        id: detect
        run: |
          FILES=$(git diff --diff-filter=A --name-only HEAD~1 HEAD -- 'src/content/blog/*.md')
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          COUNT=$(echo "$FILES" | grep -c . || true)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Send huang-zhong report
        if: steps.detect.outputs.count != '0' && steps.detect.outputs.files != ''
        run: |
          MSG="## й»ғеҝ е…§е®№е ұе‘Ҡ"
          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            TITLE=$(grep -m1 '^title:' "$FILE" | sed 's/title: *"\?\(.*\)"\?/\1/')
            CATEGORY=$(grep -m1 '^category:' "$FILE" | sed 's/category: *"\?\(.*\)"\?/\1/')
            MSG="${MSG}\n\n### е·Ізҷјеёғ\n- **${TITLE}**\n- еҲҶйЎһ: ${CATEGORY}\n- жӘ”жЎҲ: ${FILE}"
          done <<< "${{ steps.detect.outputs.files }}"
          MSG="${MSG}\n\nвң… Cloudflare Pages иҮӘеӢ•йғЁзҪІдёӯ"
          PAYLOAD=$(jq -n \
            --arg channel "huang-zhong" \
            --arg content "$MSG" \
            '{channel: $channel, content: $content}')
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "X-Auth-Token: ${{ secrets.DISCORD_RELAY_TOKEN }}" \
            -d "$PAYLOAD" \
            "${{ secrets.DISCORD_RELAY_URL }}"
